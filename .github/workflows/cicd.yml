name: CI/CD with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Set YML
      run: |
        # 현위치
        ls -al
          
        mkdir -p src/main/resources
        echo "${{secrets.APPLICATION_SECRET_PROPERTIES}}" | base64 --decode > src/main/resources/application-secret.properties
        # secret.yml 잘 생성되었는지 확인
        cat src/main/resources/application-secret.properties

    - name: grant exe
      run: chmod +x gradlew

    - name: build with gradle
      run: |
        ./gradlew clean build
          ls -a build/libs
          pwd

    - name: List compiled resources
      run: |
        find build/resources/main
        
    - name: setup ssh
      run: |
        mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.DEV_WAS }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

    - name: scp jar to was
      run: |
          scp build/libs/*.jar ec2-user@${{ secrets.DEV_WAS }}:/home/ec2-user/workspace/

    - name: restart spring
      run: |
          ssh ec2-user@${{ secrets.DEV_WAS }} 
          cd /home/ec2-user/workspace &&
          sudo systemctl restart springboot    
  
